<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>library</title>
        <link rel="stylesheet" href="styles.css">
        <link rel="icon" type="image/png" href="assets/logo_app.png">
    </head>

    <body>
        <header>
            <h1>My Library</h1>
        </header>
        <div class="books">
        </div>
        <button class="btn-add" id="btn-add">
            Add New Book
        </button>
        <dialog class="add-book" id="add-book">
            <button class="close" id="close">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><title>close</title><path d="M19,6.41L17.59,5L12,10.59L6.41,5L5,6.41L10.59,12L5,17.59L6.41,19L12,13.41L17.59,19L19,17.59L13.41,12L19,6.41Z" /></svg>
            </button>
            <form class="form-add" id="form-add">
                <label for="title">Title: </label>
                <input type="text" name="title" id="title" required>
                <label for="author">Author: </label>
                <input type="text" name="author" id="author" required>
                <label for="page">Page number: </label>
                <input type="number" name="page" id="page" required>
                <label><input type="radio" name="read" id="r-true" value="true" checked>Read</label>
                <label><input type="radio" name="read" id="r-false" value="false">Not read</label>
                <button type="submit">Add book</button>
            </form>
        </dialog>
        <script src="script.js"></script>
    </body>
</html>
